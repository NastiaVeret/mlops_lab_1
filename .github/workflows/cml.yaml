name: Build and Train Pipeline with CML

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0' # Запуск розкладом (наприклад, щонеділі) для повного тренування

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Якщо є файл requirements.txt, краще встановлювати через нього: pip install -r requirements.txt
          pip install scikit-learn pandas matplotlib seaborn mlflow joblib pytest dvc black flake8

      - name: Run code formatting check (Black)
        run: |
          # Перевіряє лише форматування, не змінюючи файли
          black --check src tests

      - name: Run linting (Flake8)
        run: |
          # Запускаємо лінтер
          flake8 src tests --max-line-length=120

      - name: Create mock dataset if missing (for CI)
        run: |
          mkdir -p data/row
          if [ ! -f "data/row/dataset.csv" ]; then
            echo "review,sentiment" > data/row/dataset.csv
            echo "good movie,positive" >> data/row/dataset.csv
            echo "bad movie,negative" >> data/row/dataset.csv
            echo "I liked it,positive" >> data/row/dataset.csv
            echo "terrible acting,negative" >> data/row/dataset.csv
            echo "waste of time,negative" >> data/row/dataset.csv
            echo "best film ever,positive" >> data/row/dataset.csv
            echo "not bad,positive" >> data/row/dataset.csv
            echo "boring,negative" >> data/row/dataset.csv
            echo "awesome,positive" >> data/row/dataset.csv
            echo "awful,negative" >> data/row/dataset.csv
          fi

      - name: Run Fast Tests (Data Validation)
        run: |
          # Виконуємо лише ті тести, що перевіряють початкові дані перед навчанням
          # Якщо потрібно запускати тести перед DVC/навчанням
          pytest tests/test_model.py::test_data_validation
          pytest tests/test_model.py::test_config_validation

      - name: Run Training Pipeline (dvc repro / python scripts)
        run: |
          # Якщо ви налаштували dvc.yaml належним чином, використовуйте:
          # dvc repro
          
          # Налаштування для PR (швидке тренування) vs Main/Schedule (повне тренування)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            export MAX_ROWS=5000
            export MAX_ITER=10
            echo "Running CI mode: MAX_ROWS=$MAX_ROWS, MAX_ITER=$MAX_ITER"
          else
            export MAX_ROWS=0
            export MAX_ITER=100
            echo "Running Full mode"
          fi
          
          # Оскільки зараз використовуємо прямий запуск:
          python src/prepare.py data/row/dataset.csv data/prepared
          python src/train.py --train_data data/prepared/train.csv --test_data data/prepared/test.csv --max_iter $MAX_ITER

      - name: Run Post-Training Tests (Quality Gate & Artifacts)
        run: |
          # Перевірка на успішне сворення файлів (модель, метрики) та Quality Gate
          pytest tests/test_model.py::test_artifacts_creation
          pytest tests/test_model.py::test_quality_gate

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Create and Publish CML Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# Звіт про навчання моделі (Training Report)" > report.md
          echo "Всі стадії (Linting, Tests, Training, Quality Gates) пройдено успішно! ✅" >> report.md
          
          # Запускаємо наш скрипт для порівняння метрик
          python src/compare_metrics.py
          
          echo "## 📊 Порівняння метрик (Baseline vs PR)" >> report.md
          echo "" >> report.md
          cat metrics_diff.md >> report.md
          echo "" >> report.md
          
          echo "## 📉 Confusion Matrix" >> report.md
          if [ -f "confusion_matrix.png" ]; then
            # Відправляємо зображення, щоб його можна було вставити у markdown
            cml publish confusion_matrix.png --md >> report.md
          else
            echo "Файл confusion_matrix.png не знайдено." >> report.md
          fi
          
          cml comment create report.md

      - name: Publish Model Artifact (CD)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            model.pkl
            metrics.json
            confusion_matrix.png
