seed: 42
mlflow:
  tracking_uri: sqlite:///mlflow.db
  experiment_name: mlops_lab_1
model:
  name: Logistic Regression
  C: 1.0
  max_iter: 100
  random_state: ${seed}
hpo:
  sampler: Random
  n_trials: 20
  metric: f1
  direction: maximize
  search_space:
    model.n_estimators:
      type: int
      low: 10
      high: 200
    model.max_depth:
      type: int
      low: 2
      high: 32
